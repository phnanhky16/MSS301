server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    consul:
      host: ${SPRING_CLOUD_CONSUL_HOST:localhost}
      port: ${SPRING_CLOUD_CONSUL_PORT:8500}
      discovery:
        enabled: true
        register: true
        health-check-path: /actuator/health
        health-check-interval: 10s
        instance-id: ${spring.application.name}:${server.port}
        deregister-critical-service-after: 30s
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # User Service Routes
        # (Use direct container DNS to avoid stale service discovery entries)
        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/users/**, /api/shipments/**
          filters:
            - StripPrefix=1

        # User Service Auth Routes (Public)
        - id: user-service-auth
          uri: http://user-service:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        # User Service OAuth2 Routes
        - id: user-service-oauth2
          uri: http://user-service:8081
          predicates:
            - Path=/oauth2/**, /login/oauth2/**
          filters:
            - StripPrefix=0

        # User Service Swagger API Docs
        - id: user-service-api-docs
          uri: http://user-service:8081
          predicates:
            - Path=/user-service/v3/api-docs, /user-service/v3/api-docs/**
          filters:
            - RewritePath=/user-service/(?<segment>.*), /${segment}

        # User Service Swagger UI resources
        - id: user-service-swagger-ui
          uri: http://user-service:8081
          predicates:
            - Path=/user-service/swagger-ui/**, /user-service/swagger-ui.html
          filters:
            - RewritePath=/user-service/(?<segment>.*), /${segment}

        # Order Service Routes
        # NOTE: Use direct container DNS instead of Consul load balancer to avoid
        # stale address caching during rapid container restarts.
        - id: order-service
          uri: http://order-service:8082
          predicates:
            - Path=/api/orders/**, /api/coupons/**
          filters:
            - StripPrefix=1

        # Payment Service Routes
        - id: payment-service
          uri: http://payment-service:8089
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1

        # Payment Service Swagger API Docs
        - id: payment-service-api-docs
          uri: http://payment-service:8089
          predicates:
            - Path=/payment-service/v3/api-docs, /payment-service/v3/api-docs/**
          filters:
            - RewritePath=/payment-service/(?<segment>.*), /${segment}

        # Payment Service Swagger UI resources
        - id: payment-service-swagger-ui
          uri: http://payment-service:8089
          predicates:
            - Path=/payment-service/swagger-ui/**, /payment-service/swagger-ui.html
          filters:
            - RewritePath=/payment-service/(?<segment>.*), /${segment}

        # Order Service Swagger API Docs
        - id: order-service-api-docs
          uri: http://order-service:8082
          predicates:
            - Path=/order-service/v3/api-docs, /order-service/v3/api-docs/**
          filters:
            - RewritePath=/order-service/(?<segment>.*), /${segment}

        # Order Service Swagger UI resources
        - id: order-service-swagger-ui
          uri: http://order-service:8082
          predicates:
            - Path=/order-service/swagger-ui/**, /order-service/swagger-ui.html
          filters:
            - RewritePath=/order-service/(?<segment>.*), /${segment}

        # Product Service Routes (with /api prefix)
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/products/**, /api/categories/**, /api/brands/**, /api/packages/**
          filters:
            - StripPrefix=1

        # Product Service Swagger API Docs (more specific, must come before general route)
        - id: product-service-api-docs
          uri: lb://product-service
          predicates:
            - Path=/product-service/v3/api-docs, /product-service/v3/api-docs/**
          filters:
            - RewritePath=/product-service/(?<segment>.*), /${segment}

        # Product Service Swagger UI resources
        - id: product-service-swagger-ui
          uri: lb://product-service
          predicates:
            - Path=/product-service/swagger-ui/**, /product-service/swagger-ui.html
          filters:
            - RewritePath=/product-service/(?<segment>.*), /${segment}

        # Product Service Routes (via service prefix for Swagger UI - general catch-all)
        - id: product-service-prefixed
          uri: lb://product-service
          predicates:
            - Path=/product-service/**
          filters:
            - RewritePath=/product-service/(?<segment>.*), /${segment}

        # Product Service Routes (direct paths for Swagger)
        - id: product-service-direct
          uri: lb://product-service
          predicates:
            - Path=/products/**, /categories/**, /brands/**
          filters:
            - StripPrefix=0

        # Product Service Swagger UI resources
        - id: product-service-swagger-ui
          uri: lb://product-service
          predicates:
            - Path=/product-service/swagger-ui/**, /product-service/swagger-ui.html
          filters:
            - RewritePath=/product-service/(?<segment>.*), /${segment}

        # Inventory Service Routes
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/warehouses/**, /api/stores/**, /api/inventory/**
          filters:
            # default statuses (5xx and 408) are used when no list is provided
            - Retry=3

        # Inventory Service Swagger API Docs (more specific, must come before general route)
        - id: inventory-service-api-docs
          uri: lb://inventory-service
          predicates:
            - Path=/inventory-service/v3/api-docs, /inventory-service/v3/api-docs/**
          filters:
            - RewritePath=/inventory-service/(?<segment>.*), /${segment}

        # Inventory Service Swagger UI resources
        - id: inventory-service-swagger-ui
          uri: lb://inventory-service
          predicates:
            - Path=/inventory-service/swagger-ui/**, /inventory-service/swagger-ui.html
          filters:
            - RewritePath=/inventory-service/(?<segment>.*), /${segment}

        # Inventory Service Routes (via service prefix for Swagger UI - general catch-all)
        - id: inventory-service-prefixed
          uri: lb://inventory-service
          predicates:
            - Path=/inventory-service/**
          filters:
            - RewritePath=/inventory-service/(?<segment>.*), /${segment}

        # Inventory Service Swagger UI resources
        - id: inventory-service-swagger-ui
          uri: lb://inventory-service
          predicates:
            - Path=/inventory-service/swagger-ui/**, /inventory-service/swagger-ui.html
          filters:
            - RewritePath=/inventory-service/(?<segment>.*), /${segment}

        # Cart Service Routes (direct /api/cart/**)
        - id: cart-service-api
          uri: lb://cart-service
          predicates:
            - Path=/api/cart/**
          filters:
            # /api/cart/carts -> /carts for cart-service controller mappings
            - StripPrefix=2

        # Cart Service Routes (via /cart-service/** prefix)
        - id: cart-service
          uri: lb://cart-service
          predicates:
            - Path=/cart-service/**
          filters:
            - RewritePath=/cart-service/(?<segment>.*), /${segment}

        # Cart Service Swagger API Docs
        - id: cart-service-api-docs
          uri: lb://cart-service
          predicates:
            - Path=/cart-service/v3/api-docs, /cart-service/v3/api-docs/**
          filters:
            - RewritePath=/cart-service/(?<segment>.*), /${segment}

        # Cart Service Swagger UI resources
        - id: cart-service-swagger-ui
          uri: lb://cart-service
          predicates:
            - Path=/cart-service/swagger-ui/**, /cart-service/swagger-ui.html
          filters:
            - RewritePath=/cart-service/(?<segment>.*), /${segment}

        # Review Service Routes
        - id: review-service
          uri: lb://review-service
          predicates:
            - Path=/api/reviews/**, /review-service/**
          filters:
            - RewritePath=/api/reviews/(?<segment>.*), /reviews/${segment}
            - RewritePath=/review-service/(?<segment>.*), /${segment}

        # Review Service Swagger API Docs
        - id: review-service-api-docs
          uri: lb://review-service
          predicates:
            - Path=/review-service/v3/api-docs, /review-service/v3/api-docs/**
          filters:
            - RewritePath=/review-service/(?<segment>.*), /${segment}

        # Review Service Swagger UI resources
        - id: review-service-swagger-ui
          uri: lb://review-service
          predicates:
            - Path=/review-service/swagger-ui/**, /review-service/swagger-ui.html
          filters:
            - RewritePath=/review-service/(?<segment>.*), /${segment}

        # Address Service Routes (public — no auth required)
        - id: address-service
          uri: lb://address-service
          predicates:
            - Path=/api/administrative-units/**
          filters:
            - StripPrefix=1

        # Address Service Swagger API Docs
        - id: address-service-api-docs
          uri: lb://address-service
          predicates:
            - Path=/address-service/v3/api-docs, /address-service/v3/api-docs/**
          filters:
            - RewritePath=/address-service/(?<segment>.*), /${segment}

        # Address Service Swagger UI resources
        - id: address-service-swagger-ui
          uri: lb://address-service
          predicates:
            - Path=/address-service/swagger-ui/**, /address-service/swagger-ui.html
          filters:
            - RewritePath=/address-service/(?<segment>.*), /${segment}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/kidfavor
          jwk-set-uri: http://localhost:8180/realms/kidfavor/protocol/openid-connect/certs

# CORS support can be toggled via configuration.  set `gateway.cors.enabled`
# to true during development to allow requests from localhost:3000; set to
# false for a stricter same-origin deployment.  (previous versions of this
# file documented the now-obsolete hard-coded behavior.)

gateway:
  cors:
    enabled: true

# Swagger/OpenAPI Configuration for Gateway aggregation
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /webjars/swagger-ui/index.html
    urls:
      - name: Inventory Service
        url: /inventory-service/v3/api-docs
      - name: Order Service
        url: /order-service/v3/api-docs
      - name: Product Service
        url: /product-service/v3/api-docs
      - name: Review Service
        url: /review-service/v3/api-docs
      - name: User Service
        url: /user-service/v3/api-docs
      - name: Address Service
        url: /address-service/v3/api-docs
      - name: Cart Service
        url: /cart-service/v3/api-docs
    urls-primary-name: User Service

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.consul: DEBUG
    org.springframework.security: DEBUG
