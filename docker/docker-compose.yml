version: "3.8"

services:
  # --- API Gateway ---
  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_CLOUD_CONSUL_PORT: 8500
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/kidfavor
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/kidfavor/protocol/openid-connect/certs
    depends_on:
      - consul
      - keycloak
    networks:
      - microservices-network

  # --- User Service ---
  user-service:
    build:
      context: ../user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-user:5432/userdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_CLOUD_CONSUL_PORT: 8500
      # Google OAuth2 Configuration
      GOOGLE_CLIENT_ID: 1085016969658-o80o0smreofoe1f0q598t88un2mkckru.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: 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

    depends_on:
      postgres-user:
        condition: service_healthy
      redis:
        condition: service_started
      consul:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - microservices-network
    restart: on-failure

  # --- Order Service ---
  order-service:
    build:
      context: ../order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-order:5432/orderdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_CLOUD_CONSUL_PORT: 8500
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PRODUCT_SERVICE_URL: http://product-service:8083
    depends_on:
      # wait until the database container reports healthy before starting the
      # Spring Boot process. the "run all services" button in VS Code invokes
      # `docker compose up` which does not rebuild images by default, but it
      # will honour the `depends_on` conditions and healthchecks below.
      postgres-order:
        condition: service_started
      consul:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - microservices-network
    restart: on-failure

  # --- Product Service ---
  product-service:
    build:
      context: ../product-service
      dockerfile: Dockerfile
    container_name: product-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-product:5432/productdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_CLOUD_CONSUL_PORT: 8500
      H2_CONSOLE_ENABLED: "false"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: product-images
    depends_on:
      postgres-product:
        condition: service_started
      consul:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - microservices-network
    restart: on-failure

  # --- Review Service ---
  review-service:
    build:
      context: ../review-service
      dockerfile: Dockerfile
    container_name: review-service
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-review:5432/reviewdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_CLOUD_CONSUL_PORT: 8500
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres-review:
        condition: service_started
    networks:
      - microservices-network
    restart: on-failure
  # --- Inventory Service ---
  inventory-service:
    build:
      context: ../inventory-service
      dockerfile: Dockerfile
    container_name: inventory-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-inventory:5432/inventorydb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_CLOUD_CONSUL_PORT: 8500
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PRODUCT_SERVICE_URL: http://product-service:8083
    depends_on:
      postgres-inventory:
        condition: service_started
    networks:
      - microservices-network
    restart: on-failure

  # --- Notification Service ---
  notification-service:
    build:
      context: ..
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    ports:
      - "8087:8087"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_CLOUD_CONSUL_PORT: 8500
      MAIL_USERNAME: ${MAIL_USERNAME:-testpersonality134@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-qhjj mrhl yyba gfly}
    depends_on:
      consul:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - microservices-network
    restart: on-failure

  # --- Cart Service ---
  cart-service:
    build:
      context: ..
      dockerfile: cart-service/Dockerfile
    container_name: cart-service
    ports:
      - "8085:8085"
    environment:
      DB_HOST: postgres-cart
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres-cart:
        condition: service_started
      redis:
        condition: service_started
      consul:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - microservices-network
    restart: on-failure

  # --- Service Discovery ---
  consul:
    image: hashicorp/consul:latest
    container_name: consul
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    command: agent -server -ui -bootstrap-expect=1 -client=0.0.0.0
    networks:
      - microservices-network

  # --- Databases (6 Separate Containers) ---
  postgres-user:
    image: postgres:16-alpine
    container_name: postgres-user
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d userdb" ]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-order:
    image: postgres:16-alpine
    container_name: postgres-order
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-order-data:/var/lib/postgresql/data
    networks:
      - microservices-network
    # healthcheck used by depends_on above; the container is considered healthy
    # once pg_isready succeeds. this allows the order-service to start only
    # after PostgreSQL has finished initializing the database files.
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d orderdb" ]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-product:
    image: postgres:16-alpine
    container_name: postgres-product
    environment:
      POSTGRES_DB: productdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres-product-data:/var/lib/postgresql/data
    networks:
      - microservices-network

  postgres-inventory:
    image: postgres:16-alpine
    container_name: postgres-inventory
    environment:
      POSTGRES_DB: inventorydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres-inventory-data:/var/lib/postgresql/data
    networks:
      - microservices-network

  postgres-cart:
    image: postgres:16-alpine
    container_name: postgres-cart
    environment:
      POSTGRES_DB: cartdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - postgres-cart-data:/var/lib/postgresql/data
    networks:
      - microservices-network

  postgres-review:
    image: postgres:16-alpine
    container_name: postgres-review
    environment:
      POSTGRES_DB: reviewdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - postgres-review-data:/var/lib/postgresql/data
    networks:
      - microservices-network

  # --- Caching ---
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - microservices-network

  # --- MinIO Object Storage ---
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000" # MinIO API
      - "9001:9001" # MinIO Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Keycloak for Authentication ---
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
    command:
      - start-dev
    ports:
      - "8180:8080"
    depends_on:
      - postgres-keycloak
    networks:
      - microservices-network

  postgres-keycloak:
    image: postgres:16-alpine
    container_name: postgres-keycloak
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5438:5432"
    volumes:
      - postgres-keycloak-data:/var/lib/postgresql/data
    networks:
      - microservices-network

  # --- Message Broker (Sửa lỗi indentation ở đây) ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ms_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - microservices-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ms_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - microservices-network

  # --- Frontend ---
  fe:
    build:
      context: ../fe
      dockerfile: Dockerfile
    container_name: fe
    ports:
      - "3000:3000"
    environment:
      # the front end talks through the gateway; this variable can be
      # overridden if the gateway lives on a different host/port.
      NEXT_PUBLIC_API_BASE_URL: http://api-gateway:8080/api
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - microservices-network
    restart: on-failure

  # --- Ensure Maven base image is available ---
  # This dummy service doesn't run anything, it just pulls whatever
  # Maven image our Dockerfiles reference when you `docker compose up` or
  # `docker compose pull`.  Having the image cached locally avoids the
  # frequent TLS handshake/timeout errors that were occurring during
  # the build phase.
  #
  # Historically the codebase used 3.9.0 in one Dockerfile while the
  # others used 3.9.6.  The workaround was to pre-pull 3.9.0, which
  # didn't help when a service still tried to pull 3.9.6.  The simplest
  # fix is to standardize on the newer 3.9.6 tag and pull it here.
  maven-base:
    image: maven:3.9.6-eclipse-temurin-17
    entrypoint: [ "true" ] # immediately exit successfully
    networks:
      - microservices-network

# --- Volumes Definition ---
volumes:
  postgres-user-data:
  postgres-order-data:
  postgres-product-data:
  postgres-inventory-data:
  postgres-cart-data:
  postgres-review-data:
  postgres-keycloak-data:
  minio-data:

    # --- Networks Definition ---
networks:
  microservices-network:
    driver: bridge
