<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Login Test - KidFavor</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .user-info {
            margin-top: 20px;
            text-align: left;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        .user-info h3 {
            margin-top: 0;
        }
        .user-info p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🛍️ KidFavor</h1>
        <p>Sign in with your Google account</p>

        <!--
        ⚠️ SETUP REQUIRED:

        1. Go to https://console.cloud.google.com/
        2. Create/Select a project

        3. Configure OAuth Consent Screen:
           - Go to: APIs & Services → OAuth consent screen
           - User Type: External (or Internal if you have Google Workspace)
           - App Information:
             * App name: KidFavor
             * User support email: your-email@gmail.com
             * Developer contact: your-email@gmail.com
           - Scopes: Add email, profile (or leave default)
           - Test users: Add your Gmail addresses
           - Save and Continue

        4. Create Credentials:
           - Go to: APIs & Services → Credentials
           - Create Credentials → OAuth client ID
           - Application type: Web application
           - Name: KidFavor Web Client
           - Authorized JavaScript origins:
             * http://localhost:3000
             * http://localhost:8080
           - Authorized redirect URIs:
             * http://localhost:3000/auth/callback
             * http://localhost:8080/login/oauth2/code/google
           - Click Create
           - COPY YOUR CLIENT ID

        5. Replace YOUR_GOOGLE_CLIENT_ID below with your actual Client ID
        -->

        <!-- Google Sign-In Button -->
        <div id="g_id_onload"
             data-client_id="1054535998093-1330g8fvc2rmfdf8ck732jbuqka0mri7.apps.googleusercontent.com"
             data-callback="handleGoogleLogin">
        </div>
        <div class="g_id_signin"
             data-type="standard"
             data-size="large"
             data-theme="outline"
             data-text="sign_in_with"
             data-shape="rectangular"
             data-logo_alignment="left">
        </div>

        <div id="message" class="message"></div>
        <div id="userInfo" class="user-info"></div>
    </div>

    <script>
        // Configuration
        const API_BASE_URL = 'http://localhost:8080/user-service';

        async function handleGoogleLogin(response) {
            console.log('Google ID Token:', response.credential);

            const messageEl = document.getElementById('message');
            const userInfoEl = document.getElementById('userInfo');

            try {
                // Show loading
                messageEl.textContent = 'Logging in...';
                messageEl.className = 'message';
                messageEl.style.display = 'block';

                // Send token to backend
                const res = await fetch(`${API_BASE_URL}/auth/google`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        token: response.credential,
                        provider: 'google'
                    })
                });

                const data = await res.json();
                console.log('Backend response:', data);

                if (data.status === 200 && data.data) {
                    // Success!
                    messageEl.textContent = data.message;
                    messageEl.className = 'message success';

                    // Store tokens
                    localStorage.setItem('accessToken', data.data.accessToken);
                    localStorage.setItem('refreshToken', data.data.refreshToken);

                    // Display user info
                    const user = data.data.user;
                    userInfoEl.innerHTML = `
                        <h3>Welcome, ${user.fullName}!</h3>
                        <p><strong>Email:</strong> ${user.email}</p>
                        <p><strong>Username:</strong> ${user.userName}</p>
                        <p><strong>Role:</strong> ${user.role}</p>
                        <p><strong>Access Token:</strong> ${data.data.accessToken.substring(0, 50)}...</p>
                    `;
                    userInfoEl.style.display = 'block';

                    // Redirect after 2 seconds
                    setTimeout(() => {
                        // In real app, redirect to dashboard
                        console.log('Redirecting to dashboard...');
                        // window.location.href = '/dashboard';
                    }, 2000);
                } else {
                    // Error from backend
                    messageEl.textContent = `Error: ${data.message || 'Login failed'}`;
                    messageEl.className = 'message error';
                }
            } catch (error) {
                console.error('Login error:', error);
                messageEl.textContent = `Error: ${error.message}`;
                messageEl.className = 'message error';
            }
        }

        // Check if user is already logged in
        window.onload = function() {
            const accessToken = localStorage.getItem('accessToken');
            if (accessToken) {
                console.log('User already logged in');
                // Optionally redirect or show user info
            }
        };
    </script>
</body>
</html>
